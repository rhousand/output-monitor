name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set version
        id: version
        run: echo "version=$(date +'%Y.%m.%d')-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build binaries
        run: |
          mkdir dist
          GOOS=linux  GOARCH=amd64 go build -ldflags="-s -w" -o dist/output-monitor-linux-amd64  .
          GOOS=linux  GOARCH=arm64 go build -ldflags="-s -w" -o dist/output-monitor-linux-arm64  .
          GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o dist/output-monitor-darwin-amd64 .
          GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o dist/output-monitor-darwin-arm64 .

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Install Flatpak tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y flatpak flatpak-builder
          sudo flatpak remote-add --system --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y --system flathub \
            org.freedesktop.Platform//23.08 \
            org.freedesktop.Sdk//23.08

      - name: Build Flatpak (x86_64)
        run: |
          flatpak-builder --repo=flatpak-repo-x86_64 --force-clean flatpak-build-x86_64 \
            com.github.rhousand.output-monitor.json
          flatpak build-bundle flatpak-repo-x86_64 \
            dist/output-monitor-linux-x86_64.flatpak \
            com.github.rhousand.output-monitor

      - name: Build Flatpak (aarch64)
        run: |
          docker run --rm --platform linux/arm64 --privileged \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            ubuntu:22.04 bash -c "
              apt-get update -qq &&
              apt-get install -y flatpak &&
              flatpak remote-add --system --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo &&
              flatpak install -y --system flathub org.freedesktop.Platform//23.08 org.freedesktop.Sdk//23.08 &&
              flatpak build-init flatpak-build-aarch64 com.github.rhousand.output-monitor org.freedesktop.Sdk org.freedesktop.Platform 23.08 &&
              install -Dm755 dist/output-monitor-linux-arm64 flatpak-build-aarch64/files/bin/output-monitor &&
              flatpak build-finish flatpak-build-aarch64 --command=output-monitor --device=all --share=ipc --filesystem=host &&
              flatpak build-export flatpak-repo-aarch64 flatpak-build-aarch64 &&
              flatpak build-bundle flatpak-repo-aarch64 dist/output-monitor-linux-aarch64.flatpak com.github.rhousand.output-monitor
            "

      - name: Checksums
        run: cd dist && sha256sum * > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          make_latest: true
          files: dist/*
